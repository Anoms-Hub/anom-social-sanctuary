name: Export Social Content

on:
  push:
    branches: [ main ]
    paths:
      - "content/**"
      - "templates/**"
      - "scripts/**"
      - ".github/workflows/export-social.yml"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export social content
        run: pnpm export:social --if-present
